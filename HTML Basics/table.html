<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h1>Tables</h1>
    <table>
        <tr>
            <th >Serial No.</th>
            <th>Item</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        <tr>
            <td rowspan="2">1</td>
            <td>Paste</td>
            <td>$20</td>
            <td>Delete</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Gajon</td>
            <td>$14.5</td>
            <td>Delete</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Majon</td>
            <td colspan="2">$12.3</td>
        </tr>
    </table>

</body>
</html>
