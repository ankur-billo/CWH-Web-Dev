<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bold Italic and Underline</title>
</head>
<body>
    <p>It is to show <b>Bold</b></p>
    <p>It is to show <i>Italic</i></p>
    <p>It is to show <u>Underline</u></p>
    <p>It is to show <s>Strikethrough</s></p>
    <p>It is also to show <del>Strikethrough</del></p>
    <p>It is to show Superscript - H<sup>2</sup>O</p>
    <p>It is to show Subscript - CO<sub>2</sub></p>
</body>
</html>
