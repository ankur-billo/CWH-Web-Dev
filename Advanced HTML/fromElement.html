<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Fitness Form</h1>
    <form action="/process.php">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name">
        <br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" placeholder="Enter your phone number">
        <br>
        <label for="pass">Password:</label>
        <input type="password" id="pass" placeholder="Enter your password">
        <br>
        <input type="submit" value="Submit">
        <br>

        <p>Choose your Gender:</p>

        <label for="gender">Male</label>
        <input type="radio" name="gender" id="male" value="male">

        <label for="gender">Female</label>
        <input type="radio" name="gender" id="female" value="female">
        <br>

        <p>Select the Hobby:</p>

        <label for="playing">Playing</label>
        <input type="checkbox" name="playing" id="playing" value="playing">

        <label for="dancing">Dancing</label>
        <input type="checkbox" name="dancing" id="dancing" value="dancing">

        <label for="naching">Naching</label>
        <input type="checkbox" name="naching" id="naching" value="naching">

    </form>
</body>
</html>
